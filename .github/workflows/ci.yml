# Workflow 이름
name: CI Pipeline

# 실행 조건
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ── Job 1: 백엔드 빌드 & 테스트 ──
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      # 실행 권한 부여 (Permission denied 방지)
      - name: Grant execute permission for mvnw
        run: chmod +x backend/mvnw

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Maven 빌드 & 테스트
        run: |
          cd backend
          ./mvnw clean package -DskipTests

  # ── Job 2: 프론트엔드 빌드 ──
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4
        # 만약 frontend가 여전히 화살표 폴더(서브모듈)라면 아래 주석을 해제하세요
        # with:
        #   submodules: recursive

      - name: Node.js 18 설정
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 의존성 설치 & 빌드
        # 가장 에러가 적은 working-directory 방식을 채택합니다
        working-directory: ./frontend
        run: |
          npm install
          npm run build